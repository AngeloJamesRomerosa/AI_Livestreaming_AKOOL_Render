  <!-- ── Full-width video strip ── -->
  <div class="video-grid">
      <!-- Local camera -->
      <div class="video-panel">
        <div class="video-label" style="background:var(--accent);color:#fff;">Your Camera</div>
        <button class="flip-cam-btn" onclick="flipCamera()" title="Switch camera">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
            <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
          </svg>
        </button>
        <div class="video-placeholder" id="localPlaceholder">
          <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M15 10l4.553-2.276A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
          </svg>
          Camera inactive
        </div>
        <div id="local-video" style="width:100%;height:100%;"></div>
        <div class="vid-log" id="camLog"><span class="vid-log-dot"></span><span class="vid-log-text">Camera inactive</span></div>
      </div>

      <!-- Face-swapped output -->
      <div class="video-panel">
        <div class="video-label" style="background:var(--accent);color:#fff;">AI Faceswap Output</div>
        <div class="video-placeholder" id="remotePlaceholder">
          <svg width="40" height="40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          Waiting for AI stream…
        </div>
        <div id="remote-video" style="width:100%;height:100%;"></div>
        <div class="vid-log" id="aiLog"><span class="vid-log-dot"></span><span class="vid-log-text">No session</span></div>
      </div>
    </div>

    <!-- Option B BG preview — shows exactly what the OBS relay sends out -->
    <div id="bgPreviewPanel" style="display:none;">
      <div style="display:flex;gap:8px;">
        <div class="video-panel" style="flex:1;aspect-ratio:16/9;">
          <div class="video-label" style="background:rgba(52,211,153,0.8);">BG Output</div>
          <canvas id="bgPreviewCanvas" style="width:100%;height:100%;object-fit:cover;display:block;"></canvas>
          <div class="vid-log" id="bgLog"><span class="vid-log-dot"></span><span class="vid-log-text">Inactive</span></div>
        </div>
        <div class="video-panel" style="flex:1;aspect-ratio:16/9;">
          <div class="video-label" style="background:rgba(99,102,241,0.8);">Landmarks Debug</div>
          <canvas id="bgLandmarkCanvas" style="width:100%;height:100%;object-fit:cover;display:block;"></canvas>
          <div class="vid-log" id="lmLog"><span class="vid-log-dot"></span><span class="vid-log-text">Inactive</span></div>
        </div>
      </div>
    </div>
